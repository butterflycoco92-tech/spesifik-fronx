    <title>Spesifikasi Suzuki Fronx</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 20px;
            background: #f5f7fb;
            color: #333;
        }
        .wrap {
            max-width: 900px;
            margin: auto;
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,.05);
        }
        h2 {
            color: #003399;
            margin-top: 0;
            border-bottom: 2px solid #003399;
            padding-bottom: 10px;
        }
        h3 {
            color: #444;
            background: #f0f4ff;
            padding: 8px 12px;
            border-left: 4px solid #003399;
            margin-top: 25px;
            margin-bottom: 10px;
        }
        .btn-container {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 4px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: #fff;
            color: #555;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #f0f0f0;
        }
        button.active {
            background: #003399;
            color: #fff;
            border-color: #003399;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        td:first-child {
            font-weight: bold;
            width: 40%;
            color: #666;
        }
    </style>
</head>

    <h2>Spesifikasi Suzuki Fronx</h2>
    
    <div class="btn-container">
        <button class="active" data-varian="glMT">GL MT</button>

// Fungsi Render Data
function render(k){
    let html = "";
    for(let kategori in data[k]){
        html += `<h3>${kategori.toUpperCase()}</h3>`;
        html += "<table>";
        data[k][kategori].forEach(item => {
            html += `<tr><td>${item[0]}</td><td>${item[1]}</td></tr>`;
        });
        html += "</table>";
    }
    document.getElementById("out").innerHTML = html;
}

// Mengatur Event Listener untuk Tombol-tombol Varian
document.querySelectorAll("button").forEach(button => {
    button.addEventListener("click", function() {
        document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        
        const varian = this.getAttribute("data-varian");
        render(varian);
    });
});

// Jalankan varian default saat web pertama kali dibuka
render('glMT');
